<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Driver Monitoring</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap');

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
background:#0d0d0d;
color:white;
font-family:'Roboto',sans-serif;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
padding:20px;
}

/* HEADER */

.dash-header{
font-family:'Orbitron',sans-serif;
letter-spacing:3px;
text-shadow:0 0 10px rgba(255,255,255,0.2);
margin-bottom:30px;
text-align:center;
}

/* MAIN LAYOUT */

.dashboard-container{
display:flex;
flex-wrap:wrap;
width:100%;
max-width:1200px;
gap:30px;
justify-content:center;
}

/* VIDEO PANEL */

.video-panel{
flex:2;
min-width:500px;
background:linear-gradient(145deg,#1a1a1a,#121212);
padding:20px;
border-radius:12px;
box-shadow:0 8px 24px rgba(0,0,0,0.6);
position:relative;
}

.video-feed{
width:100%;
border-radius:8px;
border:2px solid #333;
background:black;
transform:scaleX(-1);
}

/* START BUTTON */

.overlay-btn{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:15px 40px;
background:#00e676;
color:black;
font-family:'Orbitron',sans-serif;
font-size:18px;
border:none;
border-radius:5px;
cursor:pointer;
box-shadow:0 0 20px rgba(0,230,118,0.7);
}

.overlay-btn:hover{
background:#00c853;
}

/* TELEMETRY */

.status-panel{
flex:1;
min-width:350px;
display:flex;
flex-direction:column;
gap:20px;
}

.metric-container{
background:linear-gradient(145deg,#1a1a1a,#121212);
padding:20px;
border-radius:12px;
border-left:5px solid #00e676;
box-shadow:0 8px 16px rgba(0,0,0,0.4);
}

.metric-container.drowsy{
border-left:5px solid red;
animation:pulse 1s infinite;
}

.metric-container.warning{
border-left:5px solid orange;
}

@keyframes pulse{
0%{box-shadow:0 0 10px rgba(255,0,0,0.4)}
50%{box-shadow:0 0 30px rgba(255,0,0,0.8)}
100%{box-shadow:0 0 10px rgba(255,0,0,0.4)}
}

.metric-title{
color:#888;
font-size:13px;
letter-spacing:1px;
margin-bottom:5px;
}

.metric-value{
font-family:'Orbitron',sans-serif;
font-size:32px;
}

.text-awake{color:#00e676}
.text-warning{color:orange}
.text-drowsy{color:red}

/* PROGRESS BAR */

.fatigue-bar-container{
width:100%;
background:#333;
border-radius:10px;
overflow:hidden;
height:15px;
margin-top:10px;
}

.fatigue-bar{
height:100%;
width:0%;
background:#00e676;
transition:width 0.3s;
}

/* FPS */

.system-info{
margin-top:10px;
font-size:12px;
color:#aaa;
}

</style>
</head>

<body>

<h1 class="dash-header">🚗 AI DRIVER MONITORING HUB</h1>

<div class="dashboard-container">

<div class="video-panel">

<div style="color:#aaa;margin-bottom:10px">[ LIVE BROWSER SENSOR ]</div>

<button id="startBtn" class="overlay-btn">ENGAGE SYSTEM</button>

<video id="videoElement" class="video-feed" autoplay playsinline></video>

<canvas id="canvasElement" style="display:none;"></canvas>

<div class="system-info">
<span id="fps">FPS: 0</span>
</div>

<!-- FIXED: Using Flask url_for and preloading the audio -->
<audio id="alarmAudio" loop preload="auto">
<source src="{{ url_for('static', filename='alarm.wav') }}" type="audio/wav">
</audio>

</div>

<div class="status-panel">

<div style="color:#aaa">[ TELEMETRY ]</div>

<div class="metric-container" id="box-status">
<div class="metric-title">Driver State</div>
<div class="metric-value text-awake" id="val-status">SYSTEM STANDBY</div>
</div>

<div class="metric-container">
<div class="metric-title">EAR</div>
<div class="metric-value" id="val-ear">0.00</div>
</div>

<div class="metric-container">
<div class="metric-title">Faces Detected</div>
<div class="metric-value" id="val-faces">0</div>
</div>

<div class="metric-container">
<div class="metric-title">Fatigue (<span id="val-fatigue-text">0</span>%)</div>
<div class="fatigue-bar-container">
<div class="fatigue-bar" id="val-fatigue-bar"></div>
</div>
</div>

</div>
</div>

<script>

const video=document.getElementById("videoElement")
const canvas=document.getElementById("canvasElement")
const ctx=canvas.getContext("2d")

const startBtn=document.getElementById("startBtn")
const alarmAudio=document.getElementById("alarmAudio")

let aiLoop
let lastTime=performance.now()
let frameCount=0
let isAlarm=false

startBtn.onclick=async()=>{

try{

const stream=await navigator.mediaDevices.getUserMedia({video:true})

video.srcObject=stream

startBtn.style.display="none"

// FIXED: Robust audio unlocking
alarmAudio.volume = 1.0;
alarmAudio.play().then(() => {
    alarmAudio.pause();
    alarmAudio.currentTime = 0;
}).catch((e) => {
    console.warn("Audio unlock pending: ", e);
});

video.onloadedmetadata=()=>{

canvas.width=video.videoWidth
canvas.height=video.videoHeight

aiLoop=setInterval(processFrame,500)

}

}catch(e){

alert("Camera permission required")

}

}

async function processFrame(){

ctx.drawImage(video,0,0,canvas.width,canvas.height)

const img=canvas.toDataURL("image/jpeg",0.6)

try{

const res=await fetch("/detect",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({image:img})
})

const data=await res.json()

updateUI(data)

}catch(err){

console.log("Server error")

}

updateFPS()

}

function updateFPS(){

frameCount++

const now=performance.now()

if(now-lastTime>=1000){

document.getElementById("fps").innerText="FPS: "+frameCount

frameCount=0

lastTime=now

}

}

function updateUI(data){

document.getElementById("val-ear").innerText=data.ear.toFixed(2)
document.getElementById("val-faces").innerText=data.faces

const status=document.getElementById("val-status")
const box=document.getElementById("box-status")

const fatigueBar=document.getElementById("val-fatigue-bar")

document.getElementById("val-fatigue-text").innerText=data.fatigue

fatigueBar.style.width=data.fatigue+"%"

status.innerText=data.status

if(data.is_drowsy){

status.className="metric-value text-drowsy"
box.className="metric-container drowsy"

fatigueBar.style.background="red"

if(!isAlarm){
    // FIXED: Catch errors to prevent silent failures
    alarmAudio.play().catch(e => console.error("Error playing alarm: Make sure the file is in the 'static' folder!", e));
    isAlarm=true
}

}
else if(data.is_closing){

status.className="metric-value text-warning"
box.className="metric-container warning"

fatigueBar.style.background="orange"

}
else{

status.className="metric-value text-awake"
box.className="metric-container"

fatigueBar.style.background="#00e676"

if(isAlarm){

alarmAudio.pause()
alarmAudio.currentTime=0
isAlarm=false

}

}

}

</script>

</body>
</html>
