<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Driver Drowsiness Detection</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Segoe UI", Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#1f4037,#99f2c8);
}

.container{
    background:white;
    padding:50px;
    border-radius:15px;
    width:420px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
    font-size:28px;
    margin-bottom:15px;
    color:#222;
}

.subtitle{
    color:#666;
    margin-bottom:35px;
}

.icon{
    font-size:60px;
    margin-bottom:15px;
}

.start-btn{
    background:#007bff;
    color:white;
    border:none;
    padding:15px 30px;
    font-size:18px;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

.start-btn:hover{
    background:#0056b3;
    transform:scale(1.05);
}

.status{
    margin-top:25px;
    font-size:14px;
    color:#888;
}

.footer{
    margin-top:30px;
    font-size:12px;
    color:#aaa;
}

</style>

</head>

<body>

<div class="container">

<div class="icon">🚗</div>

<h1>Driver Drowsiness Detection</h1>

<p class="subtitle">
AI powered system that monitors eye movement and alerts the driver if fatigue is detected.
</p>

<form action="/start_detection" method="POST">
<button class="start-btn">▶ Start Detection</button>
</form>

<div class="status">
System Status: <b>Ready</b>
</div>

<div class="footer">
Computer Vision • OpenCV • Dlib • Flask
</div>

</div>

</body>
</html>
